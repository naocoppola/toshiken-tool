<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TOSHIKEN TOOLS</title>
  <style>
    :root{--bg:#f7f7f5;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--accent:#0f766e;--good:#047857;--bad:#b91c1c;}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
    .wrap{max-width:820px;margin:0 auto;padding:18px 14px 28px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
    .title{font-size:22px;font-weight:800;letter-spacing:.02em}
    .sub{color:var(--muted);font-size:14px}
    .pill{background:#e7f5f3;color:#075f58;border:1px solid #bde5df;border-radius:999px;padding:6px 10px;font-size:13px;white-space:nowrap}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
    .tab{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:11px 12px;font-size:16px}
    .tab.active{background:var(--text);color:#fff;border-color:var(--text)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.04)}
    .photoBox{background:#fff;border:1px solid var(--line);border-radius:22px;min-height:260px;display:flex;align-items:center;justify-content:center;padding:18px;overflow:hidden}
    .photoBox img{max-width:100%;max-height:330px;object-fit:contain;display:block}
    .q{font-size:18px;font-weight:750;margin:14px 0 10px}
    .choices{display:grid;grid-template-columns:1fr;gap:9px}
    .choice{border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 14px;text-align:left;font-size:16px}
    .choice small{display:block;color:var(--muted);font-size:13px;margin-top:2px}
    .choice.correct{border-color:#9ad5c0;background:#effaf4}
    .choice.wrong{border-color:#f0b4b4;background:#fff1f1}
    .result{margin-top:12px;border-radius:18px;padding:13px 14px;background:#f9fafb;border:1px solid var(--line)}
    .result strong{display:block;font-size:18px}
    .ok{color:var(--good)}
    .ng{color:var(--bad)}
    .use{margin-top:8px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
    .btn{border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px 14px;font-size:16px}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .list{display:grid;gap:10px}
    .item{display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px}
    .thumb{height:72px;border-radius:14px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .thumb img{max-width:100%;max-height:70px;object-fit:contain}
    .name{font-weight:750}
    .idn{color:var(--accent);font-weight:650}
    .hidden{display:none}
    @media (min-width:680px){.choices{grid-template-columns:1fr 1fr}.card{padding:20px}.photoBox{min-height:340px}.title{font-size:26px}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <div class="title">TOSHIKEN QUEST</div>
        <div class="sub">工具名を覚えるための教材</div>
      </div>
      <div class="pill" id="countPill">30工具</div>
    </div>

    <div class="tabs">
      <button class="tab active" type="button" id="quizTab">4択クイズ</button>
      <button class="tab" type="button" id="bookTab">工具図鑑</button>
    </div>

    <section id="quiz" class="card">
      <div class="photoBox"><img id="toolImg" alt="工具写真"></div>
      <div class="q">この工具の名前は？</div>
      <div class="choices" id="choices"></div>
      <div class="result hidden" id="result"></div>
      <div class="actions">
        <button class="btn primary" type="button" id="nextBtn">次へ</button>
      </div>
    </section>

    <section id="book" class="hidden">
      <div class="list" id="toolList"></div>
    </section>
  </main>

  <script>
    let tools = [];
    let current = null;
    let answered = false;

    const imgDir = '';
    const $ = id => document.getElementById(id);

    function shuffle(array){
      return [...array].sort(() => Math.random() - 0.5);
    }

    function imgPath(tool){
      return imgDir + tool.image;
    }

    function speakJapanese(text){
      if(!('speechSynthesis' in window)){
        alert('このブラウザでは音声が使えません');
        return;
      }

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.9;
      utterance.pitch = 1.0;

      speechSynthesis.speak(utterance);
    }

    async function init(){
      const res = await fetch('tools.json');
      tools = await res.json();

      $('countPill').textContent = tools.length + '工具';

      renderBook();
      nextQuestion();
    }

    function nextQuestion(){
      answered = false;

      $('result').classList.add('hidden');
      $('result').innerHTML = '';

      current = tools[Math.floor(Math.random() * tools.length)];

      $('toolImg').src = imgPath(current);
      $('toolImg').alt = current.name + 'の写真';

      const wrong = shuffle(tools.filter(t => t.id !== current.id)).slice(0, 3);
      const options = shuffle([current, ...wrong]);

      $('choices').innerHTML = '';

      options.forEach(tool => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'choice';
        button.innerHTML = '<span>' + tool.name + '</span><small>' + tool.indonesia + '</small>';
        button.addEventListener('click', () => answer(tool, button));
        $('choices').appendChild(button);
      });
    }

    function answer(selectedTool, button){
      if(answered) return;
      answered = true;

      const ok = selectedTool.id === current.id;

      [...$('choices').children].forEach(choice => {
        const jp = choice.querySelector('span').textContent;
        if(jp === current.name) choice.classList.add('correct');
      });

      if(!ok) button.classList.add('wrong');

      $('result').classList.remove('hidden');
      $('result').innerHTML =
        '<strong class="' + (ok ? 'ok' : 'ng') + '">' + (ok ? '正解' : 'ちがいます') + '</strong>' +
        '<div class="name">' + current.name + '</div>' +
        '<button class="btn" type="button" id="speakBtn">🔊 日本語を聞く</button>' +
        '<div class="idn">' + current.indonesia + '</div>' +
        '<div class="use">用途：' + current.use + '</div>';

      $('speakBtn').addEventListener('click', () => {
        speakJapanese(current.name);
      });
    }

    function renderBook(){
      $('toolList').innerHTML = tools.map(tool =>
        '<article class="item">' +
          '<div class="thumb"><img src="' + imgPath(tool) + '" alt="' + tool.name + '"></div>' +
          '<div>' +
            '<div class="name">' + tool.name + '</div>' +
            '<div class="idn">' + tool.indonesia + '</div>' +
            '<div class="sub">用途：' + tool.use + '</div>' +
          '</div>' +
        '</article>'
      ).join('');
    }

    function show(which){
      const quiz = which === 'quiz';

      $('quiz').classList.toggle('hidden', !quiz);
      $('book').classList.toggle('hidden', quiz);
      $('quizTab').classList.toggle('active', quiz);
      $('bookTab').classList.toggle('active', !quiz);
    }

    $('nextBtn').addEventListener('click', nextQuestion);
    $('quizTab').addEventListener('click', () => show('quiz'));
    $('bookTab').addEventListener('click', () => show('book'));

    init().catch(error => {
      document.body.innerHTML =
        '<main class="wrap"><div class="card">読み込みに失敗しました。tools.json と画像ファイルを確認してください。</div></main>';
      console.error(error);
    });
  </script>
</body>
</html>
